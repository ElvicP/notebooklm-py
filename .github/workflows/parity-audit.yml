name: API Parity Audit

# Recurring heuristic check (Spec 0.1) for NotebookLM features the library
# does not model yet. Runs on the 1st of each quarter. It does NOT push
# commits — docs/feature-parity.md is regenerated via `make audit` and
# committed through a normal PR; CI only flags drift by opening an issue.

on:
  schedule:
    # 00:00 UTC on the 1st of Jan / Apr / Jul / Oct.
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  parity-audit:
    name: API Parity Audit
    runs-on: ubuntu-latest
    # Only run on the upstream repo (not forks) — same guard as rpc-health.yml.
    if: github.repository == 'teng-lin/notebooklm-py'

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run parity audit
      id: audit
      continue-on-error: true
      shell: bash
      run: |
        set +e
        make audit PYTHON=python 2>&1 | tee parity-report.txt
        exit_code=${PIPESTATUS[0]}
        echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
        exit $exit_code

    - name: Add summary
      if: always()
      shell: bash
      run: |
        echo "## API Parity Audit" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat parity-report.txt >> "$GITHUB_STEP_SUMMARY" || echo "(no report)" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"

    - name: Build issue body
      if: steps.audit.outputs.exit_code == '1'
      shell: bash
      run: |
        {
          echo "## Potential NotebookLM feature drift detected"
          echo ""
          echo "The quarterly parity audit found phrases that look like Studio"
          echo "outputs the library may not model yet. This is **heuristic** —"
          echo "verify manually, then update the relevant enum"
          echo "(\`ArtifactType\` / \`SourceType\` / chat / sharing) and run"
          echo "\`make audit\` to refresh \`docs/feature-parity.md\`."
          echo ""
          echo "**Commit:** ${GITHUB_SHA}"
          echo ""
          echo "---"
          echo ""
          echo '```'
          cat parity-report.txt
          echo '```'
        } > parity-issue-body.md

    - name: Create issue on drift
      if: steps.audit.outputs.exit_code == '1'
      uses: peter-evans/create-issue-from-file@v6
      with:
        title: "API Parity: potential new NotebookLM feature detected"
        content-filepath: parity-issue-body.md
        labels: parity-audit, automated

    - name: Upload report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: parity-audit-report
        path: |
          parity-report.txt
          docs/feature-parity.md
        retention-days: 90

    - name: Fail if audit errored
      # exit_code 2 = infra failure (no sources reachable). 1 = drift, which
      # is reported via the issue above and must not fail the workflow.
      if: steps.audit.outputs.exit_code == '2'
      run: |
        echo "Parity audit could not fetch any sources (exit 2). See report."
        exit 1
